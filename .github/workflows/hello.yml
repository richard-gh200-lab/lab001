name: Hello
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "build number 42" > result.txt
      - uses: actions/upload-artifact@v4
        with:
          name: build-result
          path: result.txt
  report:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-result
      - run: cat result.txt
